name: Quality Check

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5

    - name: Build
      run: make build

  tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5

    - name: Test Binary Functions
      env:
        TERM: xterm
      run: make run-test bin=compute_binary_tests

    - name: Test Decimal Functions
      env:
        TERM: xterm
      run: make run-test bin=compute_decimal_tests

    - name: Test Helper Functions
      run: make run-test bin="helper_tests"
